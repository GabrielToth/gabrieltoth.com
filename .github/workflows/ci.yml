name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    quality-check:
        runs-on: ubuntu-latest
        name: Quality Check

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run type-check

            - name: Lint check
              run: npm run lint

            - name: Markdown Lint
              uses: DavidAnson/markdownlint-cli2-action@main
              with:
                  globs: |
                      **/*.md
                      #node_modules
                      #test-results
                      #coverage
                      #dist
                      #out
                      #build
                      #.git
                      #playwright-report
                      #storybook-static
                      #.agents
                      #.gemini
                      #.kiro
                      #.next
                      #.opencode

            - name: Format check
              run: npm run format:check

            - name: Spell check
              run: npm run spell-check

            - name: Build
              run: npm run build

    test-suite:
        runs-on: ubuntu-latest
        name: Test Suite
        # Tests are optional - don't block deployment if they fail
        continue-on-error: true

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run Tests
              run: npm run test
              # Don't fail the workflow if tests fail
              continue-on-error: true

