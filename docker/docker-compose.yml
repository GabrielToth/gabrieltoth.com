# Docker Compose - Local Development Architecture
# Code: Local project directory
# Containers: Local machine (processing power)
#
# Architecture:
# - Frontend Network: app <-> backend
# - Backend Network: backend <-> postgres, redis (internal only)
# - Health checks: 30s interval, 3 retries
# - Restart policy: max 5 attempts in 10 minutes

services:
    # Secrets and overrides: copy .env.docker.example → .env.docker (never commit)
    # ==========================================================================
    # DATABASES (Backend Network - Internal Only)
    # ==========================================================================

    postgres:
        env_file:
            - ../.env.docker
        image: postgres:17-alpine
        container_name: platform-postgres
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: on-failure
                max_attempts: 5
                window: 600s
        environment:
            POSTGRES_USER: platform
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
            POSTGRES_DB: platform
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - log_data:/var/log/postgresql
            - ./init-schema.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U platform"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 40s

    # ==========================================================================
    # SUPABASE (Local Development - In-Memory Database)
    # ==========================================================================

    supabase:
        env_file:
            - ../.env.docker
        image: postgres:17-alpine
        container_name: platform-supabase
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: on-failure
                max_attempts: 5
                window: 600s
        environment:
            POSTGRES_USER: supabase_admin
            POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD}
            POSTGRES_DB: postgres
        volumes:
            - supabase_data:/var/lib/postgresql/data
        networks:
            - backend
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U supabase_admin"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 40s
        ports:
            - "5432:5432"

    redis:
        image: redis:7-alpine
        container_name: platform-redis
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: on-failure
                max_attempts: 5
                window: 600s
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - backend
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 10s

    # ==========================================================================
    # BACKEND API (Bridge between Frontend and Backend Networks)
    # ==========================================================================

    backend:
        env_file:
            - ../.env.docker
        image: platform-backend:latest
        container_name: platform-backend
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: on-failure
                max_attempts: 5
                window: 600s
        environment:
            - NODE_ENV=development
            - NODE_OPTIONS=--max-old-space-size=512 --expose-gc
            - DATABASE_URL=postgresql://platform:${POSTGRES_PASSWORD}@postgres:5432/platform
            - REDIS_URL=redis://redis:6379
            - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
            - DEBUG=${DEBUG}
            - PORT=4000
            - SUPABASE_URL=http://supabase:5432
            - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
            - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
            # ========================================================================
            # Secure Password Storage - Argon2id Configuration
            # ========================================================================
            - ARGON2_MEMORY_COST=${ARGON2_MEMORY_COST:-64}
            - ARGON2_TIME_COST=${ARGON2_TIME_COST:-3}
            - ARGON2_PARALLELISM=${ARGON2_PARALLELISM:-2}
            - PEPPER_SECRET=${PEPPER_SECRET}
            # ========================================================================
            # CAPTCHA Configuration
            # ========================================================================
            - CAPTCHA_PROVIDER=${CAPTCHA_PROVIDER:-cloudflare}
            - CAPTCHA_SECRET_KEY=${CAPTCHA_SECRET_KEY}
            - NEXT_PUBLIC_CAPTCHA_SITE_KEY=${NEXT_PUBLIC_CAPTCHA_SITE_KEY}
            # ========================================================================
            # Rate Limiting Configuration
            # ========================================================================
            - RATE_LIMIT_FAILURE_THRESHOLD=${RATE_LIMIT_FAILURE_THRESHOLD:-5}
            - RATE_LIMIT_WINDOW_MINUTES=${RATE_LIMIT_WINDOW_MINUTES:-15}
            - RATE_LIMIT_LOCKOUT_MINUTES=${RATE_LIMIT_LOCKOUT_MINUTES:-15}
            - RATE_LIMIT_CAPTCHA_ESCALATION_THRESHOLD=${RATE_LIMIT_CAPTCHA_ESCALATION_THRESHOLD:-3}
        volumes:
            - log_data:/var/log/app
        networks:
            - frontend
            - backend
        ports:
            - "4000:4000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            supabase:
                condition: service_healthy

    # ==========================================================================
    # FRONTEND APP (Next.js - Frontend Network Only)
    # ==========================================================================

    app:
        env_file:
            - ../.env.docker
        build:
            context: ..
            dockerfile: docker/Dockerfile.app
        image: platform-app:latest
        container_name: platform-app
        restart: unless-stopped
        deploy:
            restart_policy:
                condition: on-failure
                max_attempts: 5
                window: 600s
        environment:
            - NODE_ENV=development
            - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
            - DEBUG=${DEBUG}
            - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
            - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
            - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
            - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
            # ========================================================================
            # Secure Password Storage - Public Configuration (Frontend)
            # ========================================================================
            - NEXT_PUBLIC_CAPTCHA_SITE_KEY=${NEXT_PUBLIC_CAPTCHA_SITE_KEY}
            - CAPTCHA_PROVIDER=${CAPTCHA_PROVIDER:-cloudflare}
        volumes:
            - log_data:/var/log/app
        networks:
            - frontend
        ports:
            - "3000:3000"
        depends_on:
            backend:
                condition: service_healthy

    # ==========================================================================
    # DEVELOPMENT MODE (Optional Profile)
    # ==========================================================================

    app-dev:
        profiles: ["dev"]
        env_file:
            - ../.env.docker
        image: node:22-alpine
        container_name: platform-app-dev
        environment:
            - NODE_ENV=development
            - DATABASE_URL=postgresql://platform:${POSTGRES_PASSWORD}@postgres:5432/platform
            - REDIS_URL=redis://redis:6379
            - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
            - DEBUG=true
            # ========================================================================
            # Supabase Configuration (Local Development)
            # ========================================================================
            - NEXT_PUBLIC_SUPABASE_URL=http://localhost:5432
            - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
            - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
            # ========================================================================
            # Secure Password Storage - Argon2id Configuration
            # ========================================================================
            - ARGON2_MEMORY_COST=${ARGON2_MEMORY_COST:-64}
            - ARGON2_TIME_COST=${ARGON2_TIME_COST:-3}
            - ARGON2_PARALLELISM=${ARGON2_PARALLELISM:-2}
            - PEPPER_SECRET=${PEPPER_SECRET}
            # ========================================================================
            # CAPTCHA Configuration
            # ========================================================================
            - CAPTCHA_PROVIDER=${CAPTCHA_PROVIDER:-cloudflare}
            - CAPTCHA_SECRET_KEY=${CAPTCHA_SECRET_KEY}
            - NEXT_PUBLIC_CAPTCHA_SITE_KEY=${NEXT_PUBLIC_CAPTCHA_SITE_KEY}
            # ========================================================================
            # Rate Limiting Configuration
            # ========================================================================
            - RATE_LIMIT_FAILURE_THRESHOLD=${RATE_LIMIT_FAILURE_THRESHOLD:-5}
            - RATE_LIMIT_WINDOW_MINUTES=${RATE_LIMIT_WINDOW_MINUTES:-15}
            - RATE_LIMIT_LOCKOUT_MINUTES=${RATE_LIMIT_LOCKOUT_MINUTES:-15}
            - RATE_LIMIT_CAPTCHA_ESCALATION_THRESHOLD=${RATE_LIMIT_CAPTCHA_ESCALATION_THRESHOLD:-3}
        volumes:
            # Mount from local project directory
            - type: bind
              source: .
              target: /app
              read_only: false
            - /app/node_modules
            - /app/.next
        networks:
            - frontend
            - backend
        ports:
            - "3000:3000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            supabase:
                condition: service_healthy
        command: sh -c "npm install && npm run dev"

    # ==========================================================================
    # MONITORING (Optional Profile)
    # ==========================================================================

    prometheus:
        profiles: ["monitoring"]
        image: prom/prometheus:latest
        container_name: platform-prometheus
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        networks:
            - frontend
        ports:
            - "9090:9090"
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

# ==========================================================================
# NETWORKS
# ==========================================================================
networks:
    frontend:
        driver: bridge
        name: platform-frontend
    backend:
        driver: bridge
        internal: true # No external access - only internal container communication
        name: platform-backend

# ==========================================================================
# VOLUMES
# ==========================================================================
volumes:
    postgres_data:
        name: platform-postgres-data
    supabase_data:
        name: platform-supabase-data
    redis_data:
        name: platform-redis-data
    log_data:
        name: platform-logs
    prometheus_data:
        name: platform-prometheus-data
